<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WX station</title>
<style>
  :root{--bg:#2b2f33;--card:#373c41;--fg:#e8eaed;--mut:#9aa0a6;--accent:#3b8eea;--warn:#e0a020;--rain:#4a9be0;}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--fg);
       min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem}
  header{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:baseline;gap:.5rem}
  header h1{font-size:1.15rem;margin:0;font-weight:600}
  header .utc{color:var(--mut);font-size:.85rem;font-variant-numeric:tabular-nums}
  .temp{font-size:clamp(4rem,22vw,8rem);font-weight:200;line-height:1;margin:.3em 0 .1em}
  .temp small{font-size:.35em;color:var(--mut);vertical-align:super}
  .grid{width:100%;max-width:760px;display:grid;gap:.7rem;grid-template-columns:repeat(3,1fr)}
  .card{background:var(--card);border-radius:12px;padding:.9rem 1rem;text-align:center}
  .card .lbl{color:var(--mut);font-size:.78rem;text-transform:uppercase;letter-spacing:.04em}
  .card .val{font-size:1.7rem;font-weight:400;margin-top:.25rem;font-variant-numeric:tabular-nums}
  .card .val small{font-size:.5em;color:var(--mut)}
  .windrow{width:100%;max-width:760px;display:flex;flex-wrap:wrap;gap:1.5rem;
           justify-content:center;align-items:center;margin:1.4rem 0 .2rem}
  .gauge{display:flex;flex-direction:column;align-items:center}
  .gsvg{width:220px;height:140px}
  .gtrack{fill:none;stroke:#4b5258;stroke-width:12;stroke-linecap:round}
  .gband{fill:none;stroke-width:12;stroke-linecap:round}   /* coloured speed zones, drawn over track */
  .gneedle{stroke:var(--accent);stroke-width:4;stroke-linecap:round;transform-origin:110px 110px;
           transition:transform .25s linear, stroke .25s linear}
  .ghub{fill:var(--accent);transition:fill .25s linear}
  .gtick{fill:var(--mut);font-size:11px}
  .gval{font-size:2rem;font-weight:400;margin-top:-1.5rem;font-variant-numeric:tabular-nums}
  .gval small{font-size:.5em;color:var(--mut)}
  .card.wmaxc{grid-column:3;grid-row:1}     /* wind max 5 min: 3rd column, top */
  .card.wdirc{grid-column:3;grid-row:2}     /* wind direction: 3rd column, below */
  .wdirc .arrow{font-size:4.2rem;line-height:1;margin-top:.35rem;transition:transform .6s ease;display:inline-block}
  .wdirc .wd{color:var(--fg);font-size:1rem;font-variant-numeric:tabular-nums;text-transform:none}
  .btns{display:flex;gap:.8rem;margin:1.6rem 0 .5rem;flex-wrap:wrap;justify-content:center}
  .btn{padding:.75rem 1.8rem;border-radius:10px;background:var(--accent);color:#fff;text-decoration:none;
       font-weight:600;font-size:1rem;border:none;cursor:pointer}
  .btn.sec{background:#4b5258}
  #otaBtn{background:#4b5258}
  #otaBtn:hover,.btn.sec:hover{background:var(--accent)}
  .links{margin-top:.6rem;font-size:.85rem}
  .links a{color:var(--accent);text-decoration:none;margin:0 .5rem}
  .stale{opacity:.45}
  footer{color:var(--mut);font-size:.75rem;margin-top:auto;padding-top:1rem}
  .hide{display:none}
</style>
</head>
<body>
  <header>
    <h1 id="call">WX</h1>
    <span class="utc">UTC <span id="utc">--:--</span></span>
  </header>

  <div class="temp"><span id="temp">--</span><small>&deg;C</small></div>

  <div class="grid">
    <div class="card" id="cardHum">
      <div class="lbl">Rel. humidity</div><div class="val"><span id="hum">--</span><small>%</small></div>
    </div>
    <div class="card" id="cardPress">
      <div class="lbl">Pressure (MSL)</div><div class="val"><span id="press">--</span> <small>hPa</small></div>
    </div>
    <div class="card">
      <div class="lbl">Rain today</div><div class="val"><span id="rain">--</span> <small>mm</small></div>
    </div>
    <div class="card" id="cardDew">
      <div class="lbl">Dew point (calc.)</div><div class="val"><span id="dew">--</span> <small>&deg;C</small></div>
    </div>
    <div class="card wmaxc">
      <div class="lbl">Wind max 5 min</div><div class="val"><span id="wmax">--</span> <small>m/s</small></div>
      <div class="lbl" id="wmaxt" style="margin-top:.2rem"></div>
    </div>
    <div class="card wdirc">
      <div class="lbl">Wind dir <span class="wd" id="wdirv"><span id="wdir">--</span>&deg;</span></div>
      <div class="arrow" id="arrow">&#8593;</div>
    </div>
  </div>

  <div class="windrow">
    <div class="gauge">
      <svg viewBox="0 0 220 140" class="gsvg" aria-label="wind speed">
        <path class="gtrack" d="M20 110 A 90 90 0 0 1 200 110"/>
        <line id="needle" class="gneedle" x1="110" y1="110" x2="110" y2="28"/>
        <circle cx="110" cy="110" r="6" class="ghub"/>
      </svg>
      <div class="gval"><span id="wnow">--</span> <small>m/s</small></div>
    </div>
  </div>

  <div class="btns">
    <a class="btn" id="otaBtn" href="#">OTA</a>
    <a class="btn sec" href="/setup">SETUP</a>
    <a class="btn sec" href="/wall">MQTT wall</a>
  </div>
  <div class="links">
    <a id="aprsLink" class="hide" target="_blank" rel="noopener">aprs.fi</a>
    <a id="windyLink" class="hide" target="_blank" rel="noopener">windy.com</a>
  </div>

  <footer>rev <span id="rev">-</span> &middot; wind live &middot; rest 30 s</footer>

<script>
  var DIRS=["N","NE","E","SE","S","SW","W","NW"];
  // OTA lives on the async server on port 82
  document.getElementById('otaBtn').href = location.protocol+'//'+location.hostname+':82/update';

  function setText(id,v){document.getElementById(id).textContent=v;}
  function fmt(v,d){return (v==null||isNaN(v))?'--':Number(v).toFixed(d);}

  var GMAX=25;   // wind-speed gauge full scale, m/s (0..25 ~ 0..90 km/h)
  // speed colour zones by upper bound (m/s): green calm, orange strong, red gale+
  var ZONES=[{to:8,c:'#5d976c'},{to:14,c:'#b09050'},{to:GMAX,c:'#b76e63'}];   // saturation halved (HSL S/2)
  function speedColor(v){
    for(var i=0;i<ZONES.length;i++) if(v<=ZONES[i].to) return ZONES[i].c;
    return ZONES[ZONES.length-1].c;
  }
  // build the gauge: coloured zone arcs (behind the needle) + scale labels 0,5,..,GMAX
  (function(){
    var svg=document.querySelector('.gsvg'), ns='http://www.w3.org/2000/svg', cx=110, cy=110;
    var needle=document.getElementById('needle');
    function pt(v,r){var th=Math.PI*(1-v/GMAX);return [cx+r*Math.cos(th),cy-r*Math.sin(th)];}
    var from=0;
    ZONES.forEach(function(z){                       // one coloured arc per zone
      var a=pt(from,90), b=pt(z.to,90);
      var p=document.createElementNS(ns,'path');
      p.setAttribute('d','M'+a[0].toFixed(2)+' '+a[1].toFixed(2)+' A 90 90 0 0 1 '+b[0].toFixed(2)+' '+b[1].toFixed(2));
      p.setAttribute('class','gband'); p.setAttribute('stroke',z.c);
      svg.insertBefore(p, needle);                   // keep the band under the needle
      from=z.to;
    });
    for(var val=0; val<=GMAX; val+=5){               // scale labels (on top)
      var l=pt(val,70), t=document.createElementNS(ns,'text');
      t.setAttribute('x',l[0].toFixed(1)); t.setAttribute('y',(l[1]+4).toFixed(1));
      t.setAttribute('text-anchor','middle'); t.setAttribute('class','gtick');
      t.textContent=val; svg.appendChild(t);
    }
  })();
  // wind dir + speed. Fed by the SSE push (lastMs/windMaxMs/windDir) and by the REST polls (which add
  // periodMaxUtc). Numeric fields are always present; periodMaxUtc only from REST, so guard it.
  function applyWind(d){
    var now = Number(d.lastMs);
    setText('wnow', fmt(d.lastMs,1));     // current (instantaneous) wind speed - gauge centre
    // move the needle: 0 m/s -> -90deg (left), GMAX -> +90deg (right), and colour it by speed zone
    var v = isNaN(now) ? 0 : Math.max(0, Math.min(GMAX, now));
    var nd=document.getElementById('needle'), col=speedColor(v);
    nd.style.transform = 'rotate('+(-90 + v/GMAX*180)+'deg)';
    nd.style.stroke = col;
    document.querySelector('.ghub').style.fill = col;
    setText('wmax', fmt(d.windMaxMs,1));  // rolling max over the trailing 5 min (decoupled from MQTT)
    if(d.periodMaxUtc !== undefined){     // only the REST polls carry the timestamp
      var t = d.periodMaxUtc || '', sp = t.indexOf(' ');
      setText('wmaxt', (sp>=0) ? t.slice(sp+1) : '');
    }
    setText('wdir', d.windDir);
    document.getElementById('arrow').style.transform='rotate('+(d.windDir||0)+'deg)';
    // wind direction only meaningful when there is wind: hide just the azimuth value + arrow when
    // calm (the "Wind dir" tile and its label stay in place)
    var calm = !(Number(d.lastMs)>0);
    document.getElementById('wdirv').classList.toggle('hide', calm);
    document.getElementById('arrow').classList.toggle('hide', calm);
  }

  function apply(d){
    document.body.classList.remove('stale');
    setText('call', d.call || 'WX');
    setText('utc', d.utc || '--');
    setText('temp', fmt(d.tempC,1));
    setText('dew', fmt(d.dewC,1));
    setText('hum', fmt(d.hum,0));
    setText('press', fmt(d.pressHPa,1));
    setText('rain', fmt(d.rainMM,2));
    setText('rev', d.rev || '-');
    applyWind(d);
    document.getElementById('cardHum').classList.toggle('hide', !d.hasHum);
    document.getElementById('cardPress').classList.toggle('hide', !d.hasPress);
    document.getElementById('cardDew').classList.toggle('hide', !d.hasHum);

    var ap=document.getElementById('aprsLink');
    if(d.aprs && d.call){ap.href='https://aprs.fi/#!call='+encodeURIComponent(d.call);ap.classList.remove('hide');}
    else ap.classList.add('hide');
    var wl=document.getElementById('windyLink');
    if(d.windyId){wl.href='https://www.windy.com/station/pws-'+encodeURIComponent(d.windyId);wl.classList.remove('hide');}
    else wl.classList.add('hide');
  }

  function poll(){
    fetch('/api/live',{cache:'no-store'})
      .then(function(r){return r.json();})
      .then(apply)
      .catch(function(){document.body.classList.add('stale');});
  }
  // Fallback wind poll, used only while the SSE stream is down (old browser, network blip).
  var sseOK=false;
  function pollWind(){
    if(sseOK) return;           // SSE is feeding the needle - don't double-poll
    fetch('/api/wind',{cache:'no-store'})
      .then(function(r){return r.json();})
      .then(applyWind)
      .catch(function(){/* a missed fast poll is harmless; the next one recovers */});
  }

  // Live wind push via Server-Sent Events from WindTask (async server on :82). Gives a smooth, gust-
  // reactive needle without polling. The browser auto-reconnects on error; we just flip sseOK so the
  // fallback poll resumes meanwhile. /api/live (below) still carries the slow sensors + max timestamp.
  function startSSE(){
    if(!window.EventSource) return;   // very old browser -> stays on polling
    var es = new EventSource(location.protocol+'//'+location.hostname+':82/events');
    es.addEventListener('wind', function(e){
      sseOK=true;
      try{ applyWind(JSON.parse(e.data)); }catch(_){}
    });
    es.onerror = function(){ sseOK=false; };   // EventSource reconnects on its own
  }

  poll();                       // full set once on load
  pollWind();                   // immediate fresh wind (before SSE is up)
  startSSE();                   // then switch to live push
  setInterval(pollWind,2000);   // fallback wind poll (no-op while SSE is alive)
  setInterval(poll,30000);      // temp/hum/press/rain + max timestamp: ~2x per minute
</script>
</body>
</html>
